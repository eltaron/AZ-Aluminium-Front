<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>400 — Bad Request | AZ Aluminium</title>
    <meta name="description" content="The request could not be understood. Please check your input and try again." />
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/app.css" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        position: relative;
        overflow: hidden;
        padding: 40px 20px;
      }
      .error-page::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(var(--primary-blue) 0.5px, transparent 0.5px); background-size: 40px 40px; opacity: 0.04; pointer-events: none; }
      .error-card { text-align: center; max-width: 560px; padding: 60px 50px; background: #fff; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.06); border: 1px solid #edf2f7; position: relative; z-index: 1; }
      .error-card .err-code { font-size: 120px; font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--primary-blue), var(--cta-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .error-card .err-icon { font-size: 56px; color: var(--cta-orange); margin-bottom: 10px; opacity: 0.6; }
      .error-card h2 { font-size: 28px; font-weight: 700; color: var(--primary-blue); margin-bottom: 12px; }
      .error-card p { color: var(--header-gray); font-size: 15px; line-height: 1.7; margin-bottom: 30px; }
      .error-card .err-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      .error-card .err-actions a { padding: 14px 32px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s; font-size: 15px; }
      .error-card .err-actions .btn-primary-custom { background: var(--primary-blue); color: #fff; }
      .error-card .err-actions .btn-primary-custom:hover { background: #15304a; transform: translateY(-2px); }
      .error-card .err-actions .btn-outline-custom { background: transparent; color: var(--primary-blue); border: 2px solid var(--primary-blue); }
      .error-card .err-actions .btn-outline-custom:hover { background: var(--primary-blue); color: #fff; }
      @media (max-width: 576px) { .error-card { padding: 40px 25px; } .error-card .err-code { font-size: 80px; } .error-card h2 { font-size: 22px; } }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-card">
        <div class="err-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="err-code">400</div>
        <h2>Bad Request</h2>
        <p>The request could not be understood due to malformed syntax. Please check your input and try again.</p>
        <div class="err-actions">
          <a href="javascript:history.back()" class="btn-primary-custom"><i class="fa-solid fa-arrow-left me-2"></i>Go Back</a>
          <a href="../index.html" class="btn-outline-custom"><i class="fa-solid fa-house me-2"></i>Back to Home</a>
        </div>
      </div>
    </div>
  </body>
</html>
