<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Ticket | AZ Aluminium</title>
    <meta name="description" content="Submit a support ticket to AZ Aluminium — report issues, request service, or get technical help." />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <style>
      .ticket-hero {
        background: linear-gradient(135deg, #0a1929 0%, #1a365d 50%, #0a1929 100%);
        padding: 100px 0 80px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .ticket-hero::before {
        content: ""; position: absolute; inset: 0;
        background-image: radial-gradient(circle at 25% 50%, rgba(255,107,0,0.08) 0%, transparent 50%),
          radial-gradient(circle at 75% 50%, rgba(0,150,200,0.06) 0%, transparent 50%);
        pointer-events: none;
      }
      .ticket-hero h1 { color: #fff; font-size: 42px; font-weight: 800; margin-bottom: 16px; }
      .ticket-hero p { color: rgba(255,255,255,0.7); max-width: 560px; margin: 0 auto; font-size: 17px; }
      .ticket-hero .hero-icon { font-size: 64px; color: var(--cta-orange); margin-bottom: 20px; opacity: 0.8; }
      .ticket-form-section { padding: 80px 0; background: #f8fafc; }
      .ticket-form-card {
        max-width: 720px; margin: 0 auto; background: #fff; border-radius: 24px;
        padding: 52px 44px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        border: 1px solid #edf2f7;
      }
      .ticket-form-card .form-label { font-weight: 600; color: var(--primary-blue); font-size: 14px; }
      .ticket-form-card .form-control, .ticket-form-card .form-select {
        border-radius: 12px; padding: 14px 18px; border: 2px solid #e2e8f0;
        font-size: 15px; transition: 0.3s;
      }
      .ticket-form-card .form-control:focus, .ticket-form-card .form-select:focus {
        border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(10,25,41,0.08);
      }
      .ticket-form-card textarea.form-control { min-height: 150px; resize: vertical; }
      .ticket-form-card .btn-submit {
        width: 100%; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 16px;
        background: var(--primary-blue); color: #fff; border: none; transition: 0.3s;
      }
      .ticket-form-card .btn-submit:hover { background: #15304a; transform: translateY(-2px); }
      .priority-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; }
      .priority-low { background: #d4edda; color: #155724; }
      .priority-medium { background: #fff3cd; color: #856404; }
      .priority-high { background: #f8d7da; color: #721c24; }
      .priority-urgent { background: #721c24; color: #fff; }
      .priority-selector { display: flex; gap: 10px; flex-wrap: wrap; }
      .priority-selector .prio-btn {
        padding: 10px 22px; border-radius: 50px; border: 2px solid #e2e8f0;
        background: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
        transition: 0.3s; display: flex; align-items: center; gap: 8px;
      }
      .priority-selector .prio-btn:hover { border-color: var(--primary-blue); }
      .priority-selector .prio-btn.selected { border-color: var(--primary-blue); background: var(--primary-blue); color: #fff; }
      .priority-selector .prio-btn input { display: none; }
      .success-box {
        text-align: center; padding: 60px 40px;
      }
      .success-box .s-icon { font-size: 72px; color: #38a169; margin-bottom: 20px; }
      .success-box h3 { font-weight: 700; color: var(--primary-blue); margin-bottom: 12px; }
      .success-box p { color: var(--header-gray); max-width: 450px; margin: 0 auto 8px; font-size: 15px; line-height: 1.7; }
      .success-box .ticket-ref { font-size: 24px; font-weight: 800; color: var(--cta-orange); background: #fef5ed; padding: 12px 32px; border-radius: 14px; display: inline-block; margin: 16px 0 24px; }
      .success-box .btn-cta { padding: 14px 40px; border-radius: 14px; font-weight: 600; background: var(--primary-blue); color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
      .success-box .btn-cta:hover { background: #15304a; }
      @media (max-width: 768px) {
        .ticket-hero h1 { font-size: 28px; }
        .ticket-hero { padding: 70px 0 50px; }
        .ticket-form-card { padding: 32px 24px; }
      }
    </style>
  </head>
  <body>
    <div id="az-loader">
      <div class="az-loader-logo"><img src="images/logo.png" alt="AZ Aluminium"></div>
      <div class="az-loader-text">AZ Aluminium</div>
      <div class="az-loader-dots"><span></span><span></span><span></span></div>
    </div>
    <script>window.addEventListener('load',function(){var l=document.getElementById('az-loader');if(l){setTimeout(function(){l.classList.add('hide');},200);}});</script>
    <div id="navbar-placeholder"></div>

    <main>
      <section class="ticket-hero">
        <div class="container">
          <div class="hero-icon"><i class="fa-solid fa-headset"></i></div>
          <h1>Submit a Support Ticket</h1>
          <p>Facing an issue or need technical assistance? Let us know and our team will get back to you promptly.</p>
        </div>
      </section>

      <section class="ticket-form-section">
        <div class="container">
          <div class="ticket-form-card" id="ticketFormCard">
            <form id="ticketForm" onsubmit="return submitTicket(event)">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label">Full Name <span style="color:#e53e3e;">*</span></label>
                  <input type="text" class="form-control" id="tName" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email Address <span style="color:#e53e3e;">*</span></label>
                  <input type="email" class="form-control" id="tEmail" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-control" id="tPhone" placeholder="+31 6 12345678" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Order / Quote Reference</label>
                  <input type="text" class="form-control" id="tRef" placeholder="e.g. AZ-2024-0042 or Q-2024-0183" />
                </div>
                <div class="col-12">
                  <label class="form-label">Subject <span style="color:#e53e3e;">*</span></label>
                  <select class="form-select" id="tSubject" required>
                    <option value="">Select a topic...</option>
                    <option value="product-issue">Product Defect or Issue</option>
                    <option value="installation">Installation Problem</option>
                    <option value="warranty">Warranty Claim</option>
                    <option value="service">Service / Maintenance Request</option>
                    <option value="order">Order / Delivery Inquiry</option>
                    <option value="billing">Billing or Invoice Question</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Priority <span style="color:#e53e3e;">*</span></label>
                  <div class="priority-selector" id="priorityGroup">
                    <label class="prio-btn selected" data-value="low">
                      <input type="radio" name="priority" value="low" checked />
                      <i class="fa-regular fa-circle" style="color:#38a169;"></i> Low
                    </label>
                    <label class="prio-btn" data-value="medium">
                      <input type="radio" name="priority" value="medium" />
                      <i class="fa-solid fa-circle-exclamation" style="color:#d69e2e;"></i> Medium
                    </label>
                    <label class="prio-btn" data-value="high">
                      <input type="radio" name="priority" value="high" />
                      <i class="fa-solid fa-circle-exclamation" style="color:#e53e3e;"></i> High
                    </label>
                    <label class="prio-btn" data-value="urgent">
                      <input type="radio" name="priority" value="urgent" />
                      <i class="fa-solid fa-bolt" style="color:#e53e3e;"></i> Urgent
                    </label>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label">Message <span style="color:#e53e3e;">*</span></label>
                  <textarea class="form-control" id="tMessage" required placeholder="Please describe your issue in detail. Include any relevant photos or document references..."></textarea>
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="tConsent" required style="border:2px solid #e2e8f0;border-radius:4px;" />
                    <label class="form-check-label" for="tConsent" style="font-size:13px;color:var(--header-gray);">
                      I agree that AZ Aluminium may process my data in accordance with the <a href="privacy-policy.html" style="color:var(--cta-orange);">Privacy Policy</a>.
                    </label>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn-submit mt-4"><i class="fa-regular fa-paper-plane me-2"></i>Submit Ticket</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      fetch('base.html')
        .then(r => r.text())
        .then(html => {
          const navbar = html.match(/<header[\s\S]*?<\/header>/);
          const footer = html.match(/<footer[\s\S]*?<\/footer>/);
          const mobileNav = html.match(/<nav class="mobile-bottom-nav"[\s\S]*?<\/nav>/);
          if (navbar) document.getElementById('navbar-placeholder').innerHTML = navbar[0];
          if (footer) document.getElementById('footer-placeholder').innerHTML = footer[0] + (mobileNav ? mobileNav[0] : '');
        });

      document.querySelectorAll('.prio-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          this.querySelector('input[type="radio"]').checked = true;
        });
      });

      function submitTicket(e) {
        e.preventDefault();
        const name = document.getElementById('tName').value.trim();
        const email = document.getElementById('tEmail').value.trim();
        const subject = document.getElementById('tSubject').value;
        const priority = document.querySelector('input[name="priority"]:checked').value;
        const ref = document.getElementById('tRef').value.trim();

        if (!name || !email || !subject || !document.getElementById('tMessage').value.trim()) return false;

        const ticketRef = 'TKT-' + Date.now().toString().slice(-6);

        const card = document.getElementById('ticketFormCard');
        card.innerHTML = `
          <div class="success-box">
            <div class="s-icon"><i class="fa-regular fa-circle-check"></i></div>
            <h3>Ticket Submitted Successfully</h3>
            <p>Thank you, ${name}. Your request has been received and our support team will review it shortly.</p>
            <div class="ticket-ref">#${ticketRef}</div>
            <p style="font-size:13px;">We will respond to <strong>${email}</strong> within 24 hours. Please save your ticket reference for future correspondence.</p>
            <div style="margin-top:24px;">
              <a href="contact.html" class="btn-cta"><i class="fa-solid fa-headset"></i> Need Immediate Help?</a>
              <a href="faq.html" class="btn-cta" style="background:#e2e8f0;color:var(--primary-blue);margin-left:10px;">Check FAQ</a>
            </div>
          </div>`;
        return false;
      }
    </script>
  </body>
</html>
