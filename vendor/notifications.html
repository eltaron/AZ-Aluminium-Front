<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications — AZ Aluminium</title>
    <meta name="description" content="Notifications for AZ Aluminium Vendor Portal" />
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/app.css" />
    <link rel="stylesheet" href="../css/vendor.css" />
    <style>
      /* --- Page Specific --- */
      .toolbar-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }

      .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
      .filter-btn {
        padding: 8px 18px; border-radius: 50px; border: 2px solid #e2e8f0;
        background: #fff; font-size: 12px; font-weight: 600; color: var(--v-primary);
        transition: .25s; cursor: pointer; font-family: 'Poppins', sans-serif;
      }
      .filter-btn:hover { border-color: var(--v-accent); color: var(--v-accent); }
      .filter-btn.active { background: var(--v-accent); border-color: var(--v-accent); color: #fff; }

      .btn-emerald-outline {
        padding: 8px 20px; border-radius: 12px; border: 2px solid var(--v-accent);
        background: transparent; font-size: 12px; font-weight: 600; color: var(--v-accent);
        transition: .25s; cursor: pointer; font-family: 'Poppins', sans-serif;
        display: inline-flex; align-items: center; gap: 7px;
      }
      .btn-emerald-outline:hover { background: var(--v-accent); color: #fff; }

      .notif-list { display: flex; flex-direction: column; gap: 8px; }
      .notif-item {
        display: flex; align-items: flex-start; gap: 16px; padding: 18px 22px;
        background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
        transition: .3s; cursor: pointer; position: relative;
      }
      .notif-item:hover { border-color: var(--v-accent); box-shadow: 0 4px 20px rgba(0,0,0,.04); }
      .notif-item.unread { border-left: 3px solid var(--v-accent); }
      .notif-icon {
        width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center; font-size: 18px;
      }
      .notif-body { flex: 1; min-width: 0; }
      .notif-body .notif-title { font-weight: 600; font-size: 14px; color: var(--v-primary); margin-bottom: 2px; }
      .notif-body .notif-text { font-size: 13px; color: #64748b; line-height: 1.4; }
      .notif-body .notif-time { font-size: 11px; color: #94a3b8; margin-top: 4px; display: block; }
      .notif-unread-dot {
        width: 10px; height: 10px; border-radius: 50%; background: var(--v-accent);
        flex-shrink: 0; margin-top: 6px; display: none;
      }
      .notif-item.unread .notif-unread-dot { display: block; }

      @media (max-width: 576px) {
        .notif-item { padding: 14px 16px; }
        .toolbar-row { flex-direction: column; align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <div class="mobile-header">
      <div class="mh-left">
        <button class="mh-toggle" id="sidebarToggle" type="button"><i class="fa-solid fa-bars"></i></button>
        <img src="../images/logo-white.png" alt="" />
        <span class="mh-brand">AZ Aluminium</span>
      </div>
      <div class="mh-right">
        <button class="mh-btn" onclick="location.href='notifications.html'" title="Notifications">
          <i class="fa-regular fa-bell"></i>
          <span class="mh-badge">5</span>
        </button>
        <button class="mh-btn" onclick="switchLanguage()" title="Language">
          <i class="fa-solid fa-globe"></i>
        </button>
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="v-sidebar" id="sidebar">
      <div class="sb-brand">
        <img src="../images/logo-white.png" alt="AZ Aluminium" onerror="this.src='../images/logo.png'" />
        <div class="sb-text">
          <span class="sb-title">AZ Aluminium</span>
          <span class="sb-sub">Vendor Portal</span>
        </div>
      </div>
      <div class="sb-toolbar">
        <button class="tb-btn" onclick="location.href='notifications.html'" title="Notifications">
          <i class="fa-regular fa-bell"></i>
          <span class="tb-badge">5</span>
        </button>
        <button class="tb-btn" onclick="switchLanguage()" title="Language">
          <i class="fa-solid fa-globe"></i>
        </button>
      </div>
      <nav>
        <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-border-all"></i> Overview</a>
        <a href="quote-requests.html" class="nav-item"><i class="fa-regular fa-file-lines"></i> Quote Requests</a>
        <a href="orders.html" class="nav-item"><i class="fa-solid fa-truck"></i> Orders</a>
        <a href="tickets.html" class="nav-item"><i class="fa-regular fa-message"></i> Support</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
      <div class="sb-footer">
        <div class="user-card">
          <div class="avatar">SC</div>
          <div>
            <p class="u-name">SteelCraft Supplies</p>
            <p class="u-role">Premium Vendor</p>
          </div>
          <i class="fa-solid fa-chevron-right u-arrow"></i>
        </div>
        <a href="../index.html" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <main class="v-main">
      <div class="main-content">
        <div class="page-header">
          <h2>Notifications</h2>
          <p>Stay updated with quote requests, orders, and customer activity.</p>
        </div>

        <div class="toolbar-row">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all" onclick="setFilter(this,'all')">All</button>
            <button class="filter-btn" data-filter="unread" onclick="setFilter(this,'unread')">Unread</button>
            <button class="filter-btn" data-filter="quote" onclick="setFilter(this,'quote')">Quotes</button>
            <button class="filter-btn" data-filter="order" onclick="setFilter(this,'order')">Orders</button>
          </div>
          <button class="btn-emerald-outline" onclick="markAllRead()"><i class="fa-regular fa-check-circle"></i> Mark All as Read</button>
        </div>

        <div class="notif-list" id="notifList"></div>
      </div>

      <footer class="v-footer">
        <span>&copy; 2026 AZ Aluminium. All rights reserved.</span>
        <span>Vendor Portal <i class="fa-solid fa-circle" style="font-size:6px;color:var(--v-accent);margin:0 6px;"></i> Powered by AZ Platform</span>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebarOverlay'), toggle = document.getElementById('sidebarToggle');
      function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); document.body.style.overflow = 'hidden'; }
      function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); document.body.style.overflow = ''; }
      toggle.addEventListener('click', () => { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); });
      overlay.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

      function switchLanguage() {
        const langs = [
          { code: 'en', name: 'English', flag: '🇬🇧' },
          { code: 'nl', name: 'Nederlands', flag: '🇳🇱' },
          { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
          { code: 'fr', name: 'Français', flag: '🇫🇷' },
          { code: 'tr', name: 'Türkçe', flag: '🇹🇷' },
          { code: 'ar', name: 'العربية', flag: '🇸🇦' },
        ];
        Swal.fire({
          title: '<span style="font-size:20px;font-weight:700;">Choose Your Language</span>',
          html: `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:4px 0;">${langs.map(l => `<div class="swl-card" onclick="document.querySelectorAll('.swl-card').forEach(c=>c.classList.remove('active'));this.classList.add('active');document.getElementById('swlVal').value='${l.code}';" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;border:2px solid #e2e8f0;border-radius:16px;cursor:pointer;transition:.25s;background:#fff;"><span style="font-size:36px;line-height:1;">${l.flag}</span><span style="font-size:13px;font-weight:600;color:#1e293b;">${l.name}</span></div>`).join('')}<input type="hidden" id="swlVal" value="en" /></div><style>.swl-card:hover{border-color:var(--v-accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}.swl-card.active{border-color:var(--v-accent);background:#f0fdf4;box-shadow:0 4px 16px rgba(16,185,129,.15)}</style>`,
          showCancelButton: true,
          confirmButtonText: '<i class="fa-regular fa-check me-1"></i> Select',
          cancelButtonText: 'Cancel',
          confirmButtonColor: 'var(--v-accent)',
          cancelButtonColor: '#64748b',
          preConfirm: () => { const v = document.getElementById('swlVal')?.value; if (!v) { Swal.showValidationMessage('Select a language'); return false; } return v; }
        }).then(r => { if (r.isConfirmed) Swal.fire({ title: 'Language Changed', text: `Language set to ${r.value.toUpperCase()}`, icon: 'success', timer: 1500, showConfirmButton: false }); });
      }

      const notifications = [
        { type: 'quote', icon: 'fa-regular fa-file-lines', iconBg: '#dbeafe', iconColor: '#1e40af', title: 'New Quote Request', text: 'Alex Harrison requested a quote for Bioclimatic Pergola 4\u00d73m.', time: '2 hours ago', unread: true },
        { type: 'order', icon: 'fa-solid fa-truck', iconBg: '#fef3c7', iconColor: '#92400e', title: 'Order Shipped', text: 'Order ORD-0042 has been marked as shipped to Linda Park.', time: '5 hours ago', unread: true },
        { type: 'order', icon: 'fa-solid fa-box', iconBg: '#dbeafe', iconColor: '#1e40af', title: 'New Order Received', text: 'New order ORD-0071 received from Alex Harrison.', time: '1 day ago', unread: true },
        { type: 'ticket', icon: 'fa-regular fa-message', iconBg: '#f1f5f9', iconColor: 'var(--v-primary)', title: 'Support Ticket Updated', text: 'TKT-8491 has a new reply from Alex Harrison.', time: '2 days ago', unread: false },
        { type: 'quote', icon: 'fa-regular fa-file-lines', iconBg: '#d1fae5', iconColor: '#065f46', title: 'Quote Accepted', text: 'Sarah Mitchell accepted your quote Q-2024-0192.', time: '3 days ago', unread: false },
        { type: 'order', icon: 'fa-regular fa-circle-check', iconBg: '#d1fae5', iconColor: '#065f46', title: 'Order Completed', text: 'Order ORD-0058 has been completed and signed off.', time: '4 days ago', unread: false },
        { type: 'system', icon: 'fa-solid fa-gear', iconBg: '#f1f5f9', iconColor: '#64748b', title: 'Profile Updated', text: 'Your vendor profile has been updated successfully.', time: '5 days ago', unread: false },
      ];

      let currentFilter = 'all';

      function setFilter(el, filter) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        currentFilter = filter;
        renderNotifications();
      }

      function renderNotifications() {
        const filtered = notifications.filter(n => {
          if (currentFilter === 'all') return true;
          if (currentFilter === 'unread') return n.unread;
          return n.type === currentFilter;
        });
        const container = document.getElementById('notifList');
        if (!filtered.length) {
          container.innerHTML = '<div class="text-center py-5" style="color:#94a3b8;"><i class="fa-regular fa-bell-slash" style="font-size:48px;display:block;margin-bottom:12px;"></i>No notifications</div>';
          return;
        }
        container.innerHTML = filtered.map((n, i) => {
          const globalIdx = notifications.indexOf(n);
          return `<div class="notif-item${n.unread ? ' unread' : ''}" onclick="openNotifDetail(${globalIdx})">
            <div class="notif-icon" style="background:${n.iconBg};color:${n.iconColor};"><i class="${n.icon}"></i></div>
            <div class="notif-body">
              <div class="notif-title">${n.title}</div>
              <div class="notif-text">${n.text}</div>
              <span class="notif-time">${n.time}</span>
            </div>
            <div class="notif-unread-dot"></div>
          </div>`;
        }).join('');
      }

      function openNotifDetail(idx) {
        const n = notifications[idx];
        Swal.fire({
          title: n.title,
          html: '<div style="text-align:left;color:#64748b;font-size:14px;line-height:1.6;">' + n.text + '</div><div style="text-align:left;margin-top:10px;font-size:12px;color:#94a3b8;"><i class="fa-regular fa-clock me-1"></i>' + n.time + '</div>',
          icon: 'info',
          confirmButtonColor: 'var(--v-accent)',
          confirmButtonText: 'Got it',
          showCancelButton: n.unread,
          cancelButtonColor: '#64748b',
          cancelButtonText: 'Mark as Read',
        }).then(r => {
          if (r.dismiss === Swal.DismissReason.cancel) {
            n.unread = false;
            renderNotifications();
            Swal.fire({ title: 'Marked as Read', timer: 1000, showConfirmButton: false, icon: 'success' });
          }
        });
      }

      function markAllRead() {
        notifications.forEach(n => n.unread = false);
        renderNotifications();
        Swal.fire({ title: 'All Read', text: 'All notifications marked as read.', icon: 'success', timer: 1500, showConfirmButton: false });
      }

      renderNotifications();
    </script>
  </body>
</html>
